services:

  discovery-server:
    build: ./discovery-server
    ports:
      - "8761:8761"

  gateway-service:
    build: ./gateway-service
    ports:
      - "8080:8080"
    depends_on:
      - discovery-server

services:

  discovery-server:
    build: ./discovery-server
    ports:
      - "8761:8761"

  gateway-service:
    build: ./gateway-service
    ports:
      - "8080:8080"
    depends_on:
      - discovery-server

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  payment-service:
    build: ./payment-service
    depends_on:
      - rabbitmq
      - discovery-server

  transaction-service:
    build: ./transaction-service
    depends_on:
      - rabbitmq
      - discovery-server

  notification-service:
    build: ./notification-service
    depends_on:
      - rabbitmq
      - discovery-server